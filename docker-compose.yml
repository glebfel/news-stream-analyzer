services:
  redis:
    image: redis:7.4-alpine
    expose: ["6379"]
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes: ["opensearch_data:/usr/share/opensearch/data"]
    ports: ["9200:9200"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.15.0
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports: ["5601:5601"]
    depends_on:
      opensearch: { condition: service_healthy }

  neo4j:
    image: neo4j:5.22-community
    environment:
      - NEO4J_AUTH=neo4j/neopassword123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=1G
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4j_data:/data"]
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neopassword123 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  vk-collector:
    build: { context: ., dockerfile: services/vk_collector/Dockerfile }
    env_file: [.env]
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped

  telegram-collector:
    build: { context: ., dockerfile: services/telegram_collector/Dockerfile }
    env_file: [.env]
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped

  processor:
    build: { context: ., dockerfile: services/processor/Dockerfile }
    env_file: [.env]
    depends_on:
      redis: { condition: service_healthy }
      opensearch: { condition: service_healthy }
    restart: unless-stopped

  nlp-worker:
    build: { context: ., dockerfile: services/nlp_worker/Dockerfile }
    env_file: [.env]
    depends_on:
      redis: { condition: service_healthy }
      opensearch: { condition: service_healthy }
    volumes: ["hf_cache:/app/models/cache"]
    restart: unless-stopped

  graph-builder:
    build: { context: ., dockerfile: services/graph_builder/Dockerfile }
    env_file: [.env]
    depends_on:
      redis: { condition: service_healthy }
      neo4j: { condition: service_healthy }
    restart: unless-stopped

  api-gateway:
    build: { context: ., dockerfile: services/api_gateway/Dockerfile }
    env_file: [.env]
    ports: ["8000:8000"]
    depends_on:
      opensearch: { condition: service_healthy }
      neo4j: { condition: service_healthy }
    restart: unless-stopped

  dashboard:
    build: { context: ., dockerfile: services/dashboard/Dockerfile }
    env_file: [.env]
    ports: ["8501:8501"]
    depends_on: [api-gateway]
    restart: unless-stopped

volumes:
  redis_data:
  opensearch_data:
  neo4j_data:
  hf_cache:
